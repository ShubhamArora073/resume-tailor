<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Resume Tailor</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div class="container">
        <h1>Resume Tailor</h1>
        <p class="subtitle">Upload your resume, paste a job description, get an ATS-optimized PDF.</p>

        <form id="tailor-form">
            <div class="upload-zone" id="drop-zone">
                <input type="file" id="file-input" accept=".pdf" hidden>
                <p class="upload-text">Drop your PDF here or <button type="button" id="browse-btn">browse</button></p>
                <p class="file-name" id="file-name"></p>
            </div>

            <label for="jd-input">Job Description</label>
            <textarea id="jd-input" placeholder="Paste the full job description here..." rows="10" required minlength="50"></textarea>

            <button type="submit" id="submit-btn" disabled>Tailor My Resume</button>
        </form>

        <div id="progress" class="progress hidden">
            <div class="spinner"></div>
            <p id="progress-text">Processing...</p>
        </div>

        <div id="result" class="result hidden">
            <p>Your tailored resume is ready!</p>
            <p id="match-info"></p>
            <a id="download-link" class="download-btn">Download PDF</a>
        </div>

        <div id="error" class="error hidden">
            <p id="error-text"></p>
            <button id="retry-btn">Try Again</button>
        </div>
    </div>

    <script src="/static/app.js"></script>
</body>
</html>
